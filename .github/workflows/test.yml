name: Test

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x
                  cache: true

            - name: Install Geth v1.17.0
              run: |
                  curl -fsSL https://gethstore.blob.core.windows.net/builds/geth-linux-amd64-1.17.0-0cf3d3ba.tar.gz -o geth.tar.gz
                  tar xzf geth.tar.gz
                  sudo cp geth-linux-amd64-1.17.0-0cf3d3ba/geth /usr/local/bin/
                  geth version

            - name: Run tests
              run: deno task test:geth
